<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>Acme App</title>
  </head>
  <body>
    <!-- Start Coding Here -->
    <!-- Dev 1 : Nav Bar + Hero Section -->
    
    <!-- Dev 2 : Feature Section -->

    <!-- Dev 3 : Contact Section -->
     
    <div class="main-container">
        <div class="card">
            <h1>Get in Touch</h1>
            
            <form onsubmit="event.preventDefault();">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" class="form-control" placeholder="John Doe">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="john@example.com">
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" class="form-control" placeholder="Your message..."></textarea>
                </div>

                <button type="submit" class="btn-submit">Submit</button>
            </form>
        </div>
    </div>

    <footer>
        <div class="copyright">
            Acme productivity app ©2024
        </div>
        <div class="footer-links">
            <a href="#">FAQ</a>
            <a href="#">Terms</a>
            <a href="#">AI Policy</a>
            <a href="#">Pricing</a>
        </div>
    </footer>

  </body>
</html>
